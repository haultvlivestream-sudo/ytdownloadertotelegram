name: YouTube to Telegram (Nightly Engine)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan Link Video YouTube'
        required: true

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Nightly Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          # Pakai cara download yt-dlp yang sama dengan script relay kamu
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Download Video
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          
          # Pakai argumen persis seperti script relay kamu
          yt-dlp --cookies cookies.txt \
                 --js-runtime node \
                 --force-ipv4 \
                 --no-playlist \
                 --extractor-args "youtube:player_client=mweb,web" \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 "${{ github.event.inputs.video_url }}" \
                 -o "video_to_send.mp4"

      - name: 5. Upload to Telegram
        run: |
          # Menggunakan Chat ID dan Token kamu
          # Kita pakai opsi -S (silent) agar log tidak penuh tapi tetap kirim file
          curl -v -F "video=@video_to_send.mp4" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
          
