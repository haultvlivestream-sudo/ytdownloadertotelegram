name: YouTube to Telegram (Fixed)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan Link Video YouTube'
        required: true

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Download Video
        run: |
          # Menggunakan filter yang lebih fleksibel agar tidak error 'Requested format not available'
          # Dan menambahkan --no-check-certificates jika perlu
          yt-dlp --cookies cookies.txt \
          -f "best[ext=mp4]/bestvideo[ext=mp4]+bestaudio[ext=m4a]/best" \
          --merge-output-format mp4 \
          --max-filesize 2G \
          "${{ github.event.inputs.video_url }}" \
          -o "video.mp4"

      - name: Upload to Telegram
        run: |
          # Mengirim video dengan progress agar tidak disangka mati oleh GitHub
          curl -v -F "video=@video.mp4" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
          
