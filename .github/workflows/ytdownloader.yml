name: YouTube to Telegram Ultimate (2GB Support)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan Link Video YouTube'
        required: true

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools & Telethon
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl
          # Mengambil yt-dlp versi Nightly (Paling sakti tembus proteksi YT)
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U
          # Install library untuk upload file besar
          pip install telethon cryptg

      - name: 4. Download Video dari YouTube
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          # Logika download: MP4, Bypass JS Challenge, No Playlist
          yt-dlp --cookies cookies.txt \
                 --js-runtime node \
                 --force-ipv4 \
                 --no-playlist \
                 --extractor-args "youtube:player_client=mweb,web" \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 "${{ github.event.inputs.video_url }}" \
                 -o "video_untuk_dikirim.mp4"

      - name: 5. Upload ke Telegram (Bypass 50MB Limit)
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import os
          import asyncio
          from telethon import TelegramClient

          async def main():
              # Ambil kredensial dari environment
              api_id = int(os.environ['API_ID'])
              api_hash = os.environ['API_HASH']
              bot_token = os.environ['BOT_TOKEN']
              chat_id = int(os.environ['CHAT_ID'])
              file_path = 'video_untuk_dikirim.mp4'

              if not os.path.exists(file_path):
                  print("❌ Error: File video tidak ditemukan!")
                  return

              # Inisialisasi client Telegram
              client = TelegramClient('bot_session', api_id, api_hash)
              await client.start(bot_token=bot_token)
              
              async with client:
                  print(f"🚀 Memulai upload {file_path} ke Chat ID {chat_id}...")
                  await client.send_file(
                      chat_id, 
                      file_path, 
                      supports_streaming=True, 
                      caption="✅ Video Berhasil Didownload!\n\nSiap ditonton offline tanpa makan memori HP.",
                      progress_callback=lambda d, t: print(f"📡 Progress Upload: {d/t*100:.2f}%")
                  )
                  print("✨ Selesai! Cek Telegram kamu sekarang.")

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          
