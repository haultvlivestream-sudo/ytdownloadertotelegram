name: YouTube to Telegram (Final Fix)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan Link Video YouTube'
        required: true

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Pasang Node.js di awal (untuk memecahkan JS Challenge YouTube)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. Update Python dan pip
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install yt-dlp versi Master (terbaru) & FFmpeg
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install --no-cache-dir yt-dlp

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      # 4. Proses Download dengan argumen tambahan untuk bypass
      - name: Download Video
        run: |
          yt-dlp --cookies cookies.txt \
          --extractor-args "youtube:player_client=android,web" \
          -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
          --merge-output-format mp4 \
          --no-check-certificate \
          "${{ github.event.inputs.video_url }}" \
          -o "video.mp4"

      # 5. Upload ke Telegram
      - name: Upload to Telegram
        run: |
          curl -v -F "video=@video.mp4" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendVideo?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
          
